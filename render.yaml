services:
  - type: web
    name: frei-booking-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.14.0
      - key: ADMIN_TOKEN
        sync: false
      - key: SERVICE_URL
        sync: false
